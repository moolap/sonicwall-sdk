[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sonicwall-sdk"
version = "0.2.0"
description = "Python SDK for the SonicOS REST API"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
  { name = "Gandiva Tech", email = "engineering@gandiva.tech" },
]
keywords = ["sonicwall", "sonicos", "firewall", "sdk", "api"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: System :: Networking :: Firewalls",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.0",
  "anyio>=4.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "respx>=0.21",
  "ruff>=0.6",
  "mypy>=1.10",
  "python-dotenv>=1.0",
]

[project.urls]
Homepage = "https://github.com/moolap/sonicwall-sdk"
Documentation = "https://github.com/moolap/sonicwall-sdk/tree/main/docs"
Repository = "https://github.com/moolap/sonicwall-sdk"
"Bug Tracker" = "https://github.com/moolap/sonicwall-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/sonicwall"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "N", "ANN", "RUF"]
ignore = ["ANN401", "E501", "RUF022", "RUF100", "UP037", "E402"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
  "integration: tests requiring a real SonicWall device",
  "integration_write: destructive live-device write CRUD tests (opt-in)",
]
addopts = ["-m", "not integration and not integration_write"]

[tool.coverage.run]
source = ["src/sonicwall"]
omit = [
  "*/tests/*",
  "*/sonicwall/_live_validation.py",
]

[tool.coverage.report]
show_missing = true
