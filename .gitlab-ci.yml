# Workflow (Srasta-style): push dev → MR merge to main (merge commit) → tag vX.Y.Z on mainline to publish PyPI/npm.
# dev + main: same lint/test/build/security. Release stage runs only on v* tags.
# Branch policy: merge-only default branch; release tags v* must sit on mainline.
#
# Trusted publishing (no long-lived PyPI/npm publish tokens in CI when configured):
# - PyPI: https://docs.pypi.org/trusted-publishers/ — publisher type GitLab CI/CD, CI file `.gitlab-ci.yml`, environment pypi
# - npm: https://docs.npmjs.com/trusted-publishers — GitLab CI/CD, same CI file; OIDC is only supported on GitLab.com shared runners today (use NPM_TOKEN on private runners)
#
# Runner selection: `default.tags` must match tag(s) on your project/group runners (`gitlab-runner register --tag-list`).
# GitLab ANDs job tags — one runner must have every tag listed. Do not mix unrelated pools (e.g. linux + macos) in one list.
# Other Gandiva pool tags (use alone or add onto your runners if you need multiple pools to match the same list):
#   gdlab-linux, gdlab-spark, gdlab-mac, macos
# In GitLab: Settings → CI/CD → Runners → turn off "Enable shared runners for this project" so only your runners are used.
# GitLab does not expand CI variables in `tags`; change the list below if your tag name differs.
#
# No merge-request pipelines — CI runs on branch/tag pushes only (see CONTRIBUTING.md).
# https://docs.gitlab.com/ci/yaml/workflow/
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - test
  - build
  - security
  - release

variables:
  # Public OSS mirror (push from GitLab main/tags). Set GITHUB_MIRROR_TOKEN in CI/CD variables.
  GITHUB_REPO: "moolap/sonicwall-sdk"
  UV_SYSTEM_PYTHON: "false"
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  PNPM_CACHE_DIR: "${CI_PROJECT_DIR}/.pnpm-store"
  # Every job: never put Go module/toolchain under the repo (avoids undeletable golang.org/toolchain on shell runners).
  GOPATH: "/tmp/gopath-${CI_JOB_ID}"
  GOMODCACHE: "/tmp/gopath-${CI_JOB_ID}/pkg/mod"
  GOCACHE: "/tmp/gocache-${CI_JOB_ID}"
  # Match packages/go/go.mod; shell runners may ship an older Go — ci-ensure-go.sh bootstraps 1.25.10.
  GO_BOOTSTRAP_VERSION: "1.25.10"
  GOTOOLCHAIN: local
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22-alpine"
  GO_IMAGE: "golang:1.25-alpine"
  # GitHub release (not GHCR): avoids Docker ENTRYPOINT + non-root job user not being able to run /root/osv-scanner.
  OSV_SCANNER_VERSION: "v2.3.5"
  # Must be built with Go >= module version in packages/go/go.mod (v1.60.3 was Go 1.23, breaks go 1.25).
  GOLANGCI_LINT_VERSION: "v2.11.4"

default:
  tags:
    - gdlinux
    - gdlinux-gpu
  # Before git fetch/clean: drop read-only .go/ so `git clean -ffdx` does not warn (Permission denied).
  # Requires GitLab 16+ (hooks). Same logic as scripts/ci-clean-go-workspace.sh.
  hooks:
    pre_get_sources_script:
      - |
        [ -n "${CI_PROJECT_DIR:-}" ] && [ -d "${CI_PROJECT_DIR}/.go" ] || exit 0
        chmod -R u+rwx "${CI_PROJECT_DIR}/.go" 2>/dev/null || true
        rm -rf "${CI_PROJECT_DIR}/.go" 2>/dev/null || true

# Other internal runner tags (see CONTRIBUTING): GitLab ANDs `tags`, so each line below is a
# separate profile — swap with `default.tags` above if that pool is assigned to this project.
#   gdlab-linux
#   gdlab-spark
#   gdlab-mac
#   macos

# --- Cache templates ---

.python-cache: &python-cache
  cache:
    key: "python-${CI_COMMIT_REF_SLUG}"
    paths:
      - .uv-cache/
      - .uv-install/
      - packages/python/.venv/

.node-cache: &node-cache
  cache:
    key: "node-${CI_COMMIT_REF_SLUG}"
    paths:
      - .pnpm-store/
      - .pnpm-tool/
      - node_modules/
      - packages/typescript/node_modules/

# Do not cache module downloads (GOMODCACHE is global under /tmp per job).
.go-cache: &go-cache
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}-nomod"
    paths:
      - .golangci-bin/
      - .go-toolchain/

# default:rules needs GitLab 15.11+; use a hidden job + extends for older instances.
# Shell runners may reuse workspaces: strip stale .go (e.g. golang.org/toolchain) so cleanup/parallel jobs do not hit Permission denied.
.integrity:
  rules:
    - when: always
  before_script:
    - sh "${CI_PROJECT_DIR}/scripts/ci-clean-go-workspace.sh"
  after_script:
    - sh "${CI_PROJECT_DIR}/scripts/ci-clean-go-workspace.sh"

# Go jobs: remove /tmp Go trees after the job (global GOPATH/GOMODCACHE/GOCACHE point there).
.go-cache-clean:
  after_script:
    - rm -rf "/tmp/gopath-${CI_JOB_ID}" "/tmp/gocache-${CI_JOB_ID}" 2>/dev/null || true
    - sh "${CI_PROJECT_DIR}/scripts/ci-clean-go-workspace.sh"

# === LINT ===

# Blocks direct commits to the default branch — only merge commits (2+ parents) pass.
# Does not run on tag pipelines. Note: GitLab "Squash merge" yields a single-parent commit and will FAIL this job.
validate:no-direct-push-to-main:
  extends: .integrity
  stage: lint
  image: alpine:3.20
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      AUTHOR_EMAIL=$(git log -1 --format='%ae')
      COMMIT_MSG=$(git log -1 --format='%s')
      PARENT_COUNT=$(git log -1 --format='%P' | wc -w | tr -d ' ')
      echo "author=${AUTHOR_EMAIL} parents=${PARENT_COUNT} msg=${COMMIT_MSG}"
      if [ "${PARENT_COUNT}" -gt 1 ]; then
        echo "OK: merge commit"
      else
        echo "ERROR: direct push to main is not allowed."
        echo "Work on dev and merge via MR (use a regular merge commit, not squash, if this check must pass)."
        exit 1
      fi
  # Only `main` — not `$CI_DEFAULT_BRANCH` (this project may use `dev` as default; dev uses normal single-parent pushes).
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"

# Release tags `X.Y.Z` or `vX.Y.Z` must point to a commit on main (dev -> main -> tag).
validate:tag-from-main:
  extends: .integrity
  stage: lint
  image: alpine:3.20
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      git fetch origin main
      if git merge-base --is-ancestor "${CI_COMMIT_SHA}" "origin/main"; then
        echo "OK — tag ${CI_COMMIT_TAG} points to a commit reachable from main."
      else
        echo "ERROR: tag ${CI_COMMIT_TAG} is not on main."
        echo "Release policy: dev -> main -> tag."
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

# Release tag must match root VERSION and all package metadata (`0.1.0` or `v0.1.0`).
validate:release-versions:
  extends: .integrity
  stage: lint
  image: alpine:3.20
  script:
    - |
      set -eu
      test -f VERSION || { echo "ERROR: VERSION file missing"; exit 1; }
      V="$(tr -d '[:space:]' < VERSION)"
      TAG_VER="${CI_COMMIT_TAG#v}"
      if [ "${TAG_VER}" != "${V}" ]; then
        echo "ERROR: VERSION='${V}' does not match tag '${CI_COMMIT_TAG}' (use \${V} or v\${V})"
        exit 1
      fi
      PY="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' packages/python/pyproject.toml)"
      TS="$(sed -n 's/^  "version": "\([^"]*\)",$/\1/p' packages/typescript/package.json)"
      GO="$(sed -n 's/^const Version = "\([^"]*\)"$/\1/p' packages/go/version.go)"
      if [ "$PY" != "$V" ] || [ "$TS" != "$V" ] || [ "$GO" != "$V" ]; then
        echo "ERROR: version mismatch — VERSION=$V pyproject=$PY package.json=$TS version.go=$GO"
        echo "Run: python3 scripts/sync_versions_from_file.py && git commit -am 'chore: sync versions'"
        exit 1
      fi
      echo "OK — release tag ${CI_COMMIT_TAG} matches VERSION and all packages."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

python:lint:
  extends: .integrity
  stage: lint
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run ruff check src/ tests/
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run ruff format --check src/ tests/
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run mypy src/ --no-error-summary

typescript:lint:
  extends: .integrity
  stage: lint
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    # Project-local pnpm (no global install — required for shell executors without root)
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd "${CI_PROJECT_DIR}" && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run lint && pnpm run typecheck

go:lint:
  extends:
    - .integrity
    - .go-cache-clean
  stage: lint
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
    # Shell executors: cannot write /usr/local/bin (e.g. macOS gitlab-runner). Install into the project.
    - |
      set -e
      export GOLANGCI_LINT_BIN="${CI_PROJECT_DIR}/.golangci-bin"
      mkdir -p "$GOLANGCI_LINT_BIN"
      export PATH="${GOLANGCI_LINT_BIN}:${PATH}"
      STAMP="${GOLANGCI_LINT_BIN}/.installed-version"
      if [ ! -x "${GOLANGCI_LINT_BIN}/golangci-lint" ] || [ "$(cat "$STAMP" 2>/dev/null)" != "${GOLANGCI_LINT_VERSION}" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache curl
        fi
        rm -f "${GOLANGCI_LINT_BIN}/golangci-lint"
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$GOLANGCI_LINT_BIN" "${GOLANGCI_LINT_VERSION}"
        echo "${GOLANGCI_LINT_VERSION}" > "$STAMP"
      fi
  script:
    - export PATH="${CI_PROJECT_DIR}/.golangci-bin:${PATH}"
    - cd "${CI_PROJECT_DIR}/packages/go" && golangci-lint run ./...

# === TEST ===

python:test:
  extends: .integrity
  stage: test
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run pytest tests/ -v --cov=sonicwall --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=70
  # Cobertura report upload can still run on failed jobs on some runners; use log regex only (like typescript:test).
  coverage: '/TOTAL.*\s(\d+\%)/'

typescript:test:
  extends: .integrity
  stage: test
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd "${CI_PROJECT_DIR}" && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run test --coverage
  # Cobertura report upload runs even when the job fails on some runners; omit reports.* to avoid hard errors.
  coverage: '/Statements\s+:\s*(\d+(?:\.\d+)?%)/'

go:test:
  extends:
    - .integrity
    - .go-cache-clean
  stage: test
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
    # Shell executors ignore `image:`; apk is Alpine-only. Install gcc only when apk exists.
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache build-base
      fi
  script:
    # One shell: keep cwd and coverage.out path consistent for shell executors.
    - |
      set -euo pipefail
      cd "${CI_PROJECT_DIR}/packages/go"
      if command -v gcc >/dev/null 2>&1 || command -v cc >/dev/null 2>&1; then
        export CGO_ENABLED=1
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
      else
        export CGO_ENABLED=0
        go test -coverprofile=coverage.out -covermode=atomic ./...
      fi
      go tool cover -func=coverage.out | tail -1
  artifacts:
    when: on_success
    paths:
      - packages/go/coverage.out
    expire_in: 1 week

# === BUILD ===

python:build:
  extends: .integrity
  stage: build
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
  script:
    - export PATH="${CI_PROJECT_DIR}/.uv-install/bin:${PATH}"
    - cd "${CI_PROJECT_DIR}/packages/python" && uv build
  artifacts:
    paths:
      - packages/python/dist/
    expire_in: 1 week

typescript:build:
  extends: .integrity
  stage: build
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd "${CI_PROJECT_DIR}" && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run build
  artifacts:
    paths:
      - packages/typescript/dist/
    expire_in: 1 week

go:build:
  extends:
    - .integrity
    - .go-cache-clean
  stage: build
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
  script:
    - cd "${CI_PROJECT_DIR}/packages/go" && go build ./...

# === SECURITY (dependency / vuln scan — pipeline fails if OSV reports issues) ===

# Do not extend .integrity — shell before_script breaks in Docker; use a self-contained job.
security:osv-scan:
  stage: security
  dependencies: []
  image: alpine:3.20
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git curl ca-certificates
  script:
    - |
      set -eu
      cd "${CI_PROJECT_DIR}"
      git reset --hard "${CI_COMMIT_SHA}"
      git clean -ffdx
      ARCH="$(uname -m)"
      case "$ARCH" in
        x86_64) DL_SUFFIX="linux_amd64" ;;
        aarch64 | arm64) DL_SUFFIX="linux_arm64" ;;
        *) echo "osv-scanner: unsupported arch ${ARCH}" >&2; exit 1 ;;
      esac
      OSV_BIN="${CI_PROJECT_DIR}/.osv-scanner-bin"
      mkdir -p "$OSV_BIN"
      URL="https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_${DL_SUFFIX}"
      curl -fsSL -o "${OSV_BIN}/osv-scanner" "$URL"
      chmod +x "${OSV_BIN}/osv-scanner"
      export PATH="${OSV_BIN}:${PATH}"
      echo "Scanning lockfiles at commit ${CI_COMMIT_SHA}"
      osv-scanner scan \
        --lockfile=packages/python/uv.lock \
        --lockfile=pnpm-lock.yaml \
        --lockfile=packages/go/go.mod

# === RELEASE (git tag vX.Y.Z only — same cadence as Srasta platform tags) ===

python:release:
  extends: .integrity
  stage: release
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv build
    - |
      if [ -n "${PYPI_API_TOKEN:-}" ]; then
        cd "${CI_PROJECT_DIR}/packages/python" && uv publish --token "${PYPI_API_TOKEN}"
      else
        cd "${CI_PROJECT_DIR}/packages/python" && uv publish
      fi
  environment:
    name: pypi
    url: https://pypi.org/project/sonicwall-sdk/
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

typescript:release:
  extends: .integrity
  stage: release
  image: ${NODE_IMAGE}
  <<: *node-cache
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export NPM_GLOBAL="${CI_PROJECT_DIR}/.npm-global-release"
    - mkdir -p "${NPM_GLOBAL}"
    - npm install npm@11.6.2 --prefix "${NPM_GLOBAL}" --no-audit --no-fund
    - export PATH="${NPM_GLOBAL}/node_modules/.bin:${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd "${CI_PROJECT_DIR}" && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run build
    - |
      if [ -n "${NPM_TOKEN:-}" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      fi
    # Trusted publishing: npm 11.5.1+ exchanges GitLab NPM_ID_TOKEN (pnpm publish does not).
    - cd "${CI_PROJECT_DIR}/packages/typescript" && npm publish --access public
  environment:
    name: npm
    url: https://www.npmjs.com/package/@sonicwall/sdk
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

go:release:
  extends:
    - .integrity
    - .go-cache-clean
  stage: release
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
  script:
    - cd "${CI_PROJECT_DIR}/packages/go" && go build ./...
    - cd "${CI_PROJECT_DIR}/packages/go" && go test ./...
    - |
      echo "Go proxy expects a module tag at the same commit, e.g.:"
      echo "  git tag go/v${CI_COMMIT_TAG#v} ${CI_COMMIT_SHA} && git push origin go/v${CI_COMMIT_TAG#v}"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

# === GITHUB MIRROR (public OSS copy of GitLab mainline) ===
# Requires CI/CD variable GITHUB_MIRROR_TOKEN (GitHub PAT, contents: write).
# Target: https://github.com/${GITHUB_REPO}
# Skips silently when the token is unset so dev/main pipelines stay green.

mirror:github:
  extends: .integrity
  stage: release
  image: alpine:3.20
  variables:
    GIT_DEPTH: 0
  when: on_success
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN not set — skipping GitHub mirror."
        echo "Add a fine-grained PAT (contents: write) for https://github.com/${GITHUB_REPO}"
        exit 0
      fi
      if ! git remote get-url github >/dev/null 2>&1; then
        git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${GITHUB_REPO}.git"
      else
        git remote set-url github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${GITHUB_REPO}.git"
      fi
      echo "Mirroring ${CI_COMMIT_SHA} to github.com/${GITHUB_REPO} main"
      git push github "${CI_COMMIT_SHA}:refs/heads/main"
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        echo "Mirroring tag ${CI_COMMIT_TAG}"
        git push github "${CI_COMMIT_TAG}" || true
        TAG_VER="${CI_COMMIT_TAG#v}"
        git push github "go/v${TAG_VER}" 2>/dev/null || true
      else
        git push github --tags
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'
