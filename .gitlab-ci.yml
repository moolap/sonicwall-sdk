stages:
  - lint
  - test
  - build
  - security
  - release

variables:
  UV_SYSTEM_PYTHON: "false"
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  PNPM_CACHE_DIR: "${CI_PROJECT_DIR}/.pnpm-store"
  GOPATH: "${CI_PROJECT_DIR}/.go"
  GOMODCACHE: "${CI_PROJECT_DIR}/.go/pkg/mod"
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:20-alpine"
  GO_IMAGE: "golang:1.22-alpine"

# --- Cache templates ---

.python-cache: &python-cache
  cache:
    key: "python-${CI_COMMIT_REF_SLUG}"
    paths:
      - .uv-cache/
      - .uv-install/
      - packages/python/.venv/

.node-cache: &node-cache
  cache:
    key: "node-${CI_COMMIT_REF_SLUG}"
    paths:
      - .pnpm-store/
      - .pnpm-tool/
      - packages/typescript/node_modules/

.go-cache: &go-cache
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/

# === LINT ===

python:lint:
  stage: lint
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/
    - uv run mypy src/ --no-error-summary
  rules:
    - when: always

typescript:lint:
  stage: lint
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    # Project-local pnpm (no global install — required for shell executors without root)
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.0.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - pnpm run lint
    - pnpm run typecheck
  rules:
    - when: always

go:lint:
  stage: lint
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    # Shell executors ignore `image:` — only use apk inside Alpine containers.
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache curl
      fi
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.60.3
  script:
    - cd packages/go && golangci-lint run ./...
  rules:
    - when: always

# === TEST ===

python:test:
  stage: test
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - uv run pytest tests/ -v
      --cov=sonicwall
      --cov-report=term-missing
      --cov-report=xml:coverage.xml
      --cov-fail-under=70
  coverage: '/TOTAL.*\s(\d+\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: packages/python/coverage.xml
    expire_in: 1 week
  rules:
    - when: always

typescript:test:
  stage: test
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.0.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - pnpm run test --coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: packages/typescript/coverage/cobertura-coverage.xml
    expire_in: 1 week
  rules:
    - when: always

go:test:
  stage: test
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    # Shell executors ignore `image:`; apk is Alpine-only. Install gcc only when apk exists.
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache build-base
      fi
  script:
    - cd packages/go
    # -race needs CGO + a C toolchain. Use them when gcc/cc is available (Docker Alpine or typical Linux builders).
    - |
      set -e
      if command -v gcc >/dev/null 2>&1 || command -v cc >/dev/null 2>&1; then
        export CGO_ENABLED=1
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
      else
        export CGO_ENABLED=0
        go test -coverprofile=coverage.out -covermode=atomic ./...
      fi
    - go tool cover -func=coverage.out | tail -1
  artifacts:
    paths:
      - packages/go/coverage.out
    expire_in: 1 week
  rules:
    - when: always

# === BUILD ===

python:build:
  stage: build
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python
  script:
    - uv build
  artifacts:
    paths:
      - packages/python/dist/
    expire_in: 1 week
  rules:
    - when: always

typescript:build:
  stage: build
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.0.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - pnpm run build
  artifacts:
    paths:
      - packages/typescript/dist/
    expire_in: 1 week
  rules:
    - when: always

go:build:
  stage: build
  image: ${GO_IMAGE}
  <<: *go-cache
  script:
    - cd packages/go
    - go build ./...
  rules:
    - when: always

# === SECURITY ===

security:osv-scan:
  stage: security
  image: ghcr.io/google/osv-scanner:v1
  script:
    - osv-scanner --recursive .
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# === RELEASE ===

python:release:
  stage: release
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python
  script:
    - uv build
    - uv publish
      --token "${PYPI_API_TOKEN}"
  environment:
    name: pypi
    url: https://pypi.org/project/sonicwall-sdk/
  rules:
    - if: '$CI_COMMIT_TAG =~ /^python\/v\d+\.\d+\.\d+/'

typescript:release:
  stage: release
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.0.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - pnpm publish --no-git-checks --access public
  environment:
    name: npm
    url: https://www.npmjs.com/package/@sonicwall/sdk
  rules:
    - if: '$CI_COMMIT_TAG =~ /^typescript\/v\d+\.\d+\.\d+/'

go:release:
  stage: release
  image: ${GO_IMAGE}
  <<: *go-cache
  script:
    - cd packages/go
    - go build ./...
    - go test ./...
    - echo "Go module tag ${CI_COMMIT_TAG} published via git tag."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^go\/v\d+\.\d+\.\d+/'