# Integrity checks run on MRs and branch pushes (e.g. dev); release jobs on tags and/or default branch.
#
# Trusted publishing (no long-lived PyPI/npm publish tokens in CI when configured):
# - PyPI: https://docs.pypi.org/trusted-publishers/ — publisher type GitLab CI/CD, CI file `.gitlab-ci.yml`
# - npm: https://docs.npmjs.com/trusted-publishers — GitLab CI/CD, same CI file; requires GitLab.com shared runners (not self-hosted)
#
# - No duplicate MR + branch push for the same branch (GitLab workflow pattern).
# - Default-branch push pipelines are enabled so `python:release` can run after merge (tradeoff: full CI runs again on main).
# https://docs.gitlab.com/ci/yaml/workflow/
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - test
  - build
  - security
  - release

variables:
  UV_SYSTEM_PYTHON: "false"
  UV_CACHE_DIR: "${CI_PROJECT_DIR}/.uv-cache"
  PNPM_CACHE_DIR: "${CI_PROJECT_DIR}/.pnpm-store"
  # Every job: never put Go module/toolchain under the repo (avoids undeletable golang.org/toolchain on shell runners).
  GOPATH: "/tmp/gopath-${CI_JOB_ID}"
  GOMODCACHE: "/tmp/gopath-${CI_JOB_ID}/pkg/mod"
  GOCACHE: "/tmp/gocache-${CI_JOB_ID}"
  GOTOOLCHAIN: local
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22-alpine"
  GO_IMAGE: "golang:1.25-alpine"
  # GitHub release (not GHCR): avoids Docker ENTRYPOINT + non-root job user not being able to run /root/osv-scanner.
  OSV_SCANNER_VERSION: "v2.3.5"
  # Must be built with Go >= module version in packages/go/go.mod (v1.60.3 was Go 1.23, breaks go 1.25).
  GOLANGCI_LINT_VERSION: "v2.11.4"

# --- Cache templates ---

.python-cache: &python-cache
  cache:
    key: "python-${CI_COMMIT_REF_SLUG}"
    paths:
      - .uv-cache/
      - .uv-install/
      - packages/python/.venv/

.node-cache: &node-cache
  cache:
    key: "node-${CI_COMMIT_REF_SLUG}"
    paths:
      - .pnpm-store/
      - .pnpm-tool/
      - packages/typescript/node_modules/

# Do not cache module downloads (GOMODCACHE is global under /tmp per job).
.go-cache: &go-cache
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}-nomod"
    paths:
      - .golangci-bin/
      - .go-toolchain/

# default:rules needs GitLab 15.11+; use a hidden job + extends for older instances.
# Shell runners may reuse workspaces: strip stale .go (e.g. golang.org/toolchain) so cleanup/parallel jobs do not hit Permission denied.
.integrity:
  rules:
    - when: always
  before_script:
    - chmod -R u+w "${CI_PROJECT_DIR}/.go" 2>/dev/null || true
    - rm -rf "${CI_PROJECT_DIR}/.go" 2>/dev/null || true
  after_script:
    - chmod -R u+w "${CI_PROJECT_DIR}/.go" 2>/dev/null || true
    - rm -rf "${CI_PROJECT_DIR}/.go" 2>/dev/null || true

# Go jobs: remove /tmp Go trees after the job (global GOPATH/GOMODCACHE/GOCACHE point there).
.go-cache-clean:
  after_script:
    - rm -rf "/tmp/gopath-${CI_JOB_ID}" "/tmp/gocache-${CI_JOB_ID}" 2>/dev/null || true
    - chmod -R u+w "${CI_PROJECT_DIR}/.go" 2>/dev/null || true
    - rm -rf "${CI_PROJECT_DIR}/.go" 2>/dev/null || true

# === LINT ===

sdk:version-parity:
  extends: .integrity
  stage: lint
  image: alpine:3.20
  script:
    - sh "${CI_PROJECT_DIR}/scripts/check-sdk-version-parity.sh"

python:lint:
  extends: .integrity
  stage: lint
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run ruff check src/ tests/
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run ruff format --check src/ tests/
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run mypy src/ --no-error-summary

typescript:lint:
  extends: .integrity
  stage: lint
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    # Project-local pnpm (no global install — required for shell executors without root)
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run lint && pnpm run typecheck

go:lint:
  extends:
    - .integrity
    - .go-cache-clean
  stage: lint
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
    # Shell executors: cannot write /usr/local/bin (e.g. macOS gitlab-runner). Install into the project.
    - |
      set -e
      export GOLANGCI_LINT_BIN="${CI_PROJECT_DIR}/.golangci-bin"
      mkdir -p "$GOLANGCI_LINT_BIN"
      export PATH="${GOLANGCI_LINT_BIN}:${PATH}"
      STAMP="${GOLANGCI_LINT_BIN}/.installed-version"
      if [ ! -x "${GOLANGCI_LINT_BIN}/golangci-lint" ] || [ "$(cat "$STAMP" 2>/dev/null)" != "${GOLANGCI_LINT_VERSION}" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache curl
        fi
        rm -f "${GOLANGCI_LINT_BIN}/golangci-lint"
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$GOLANGCI_LINT_BIN" "${GOLANGCI_LINT_VERSION}"
        echo "${GOLANGCI_LINT_VERSION}" > "$STAMP"
      fi
  script:
    - export PATH="${CI_PROJECT_DIR}/.golangci-bin:${PATH}"
    - cd "${CI_PROJECT_DIR}/packages/go" && golangci-lint run ./...

# === TEST ===

python:test:
  extends: .integrity
  stage: test
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python && uv sync --all-extras --quiet
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv run pytest tests/ -v --cov=sonicwall --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=70
  # Cobertura report upload can still run on failed jobs on some runners; use log regex only (like typescript:test).
  coverage: '/TOTAL.*\s(\d+\%)/'

typescript:test:
  extends: .integrity
  stage: test
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run test --coverage
  # Cobertura report upload runs even when the job fails on some runners; omit reports.* to avoid hard errors.
  coverage: '/Statements\s+:\s*(\d+(?:\.\d+)?%)/'

go:test:
  extends:
    - .integrity
    - .go-cache-clean
  stage: test
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
    # Shell executors ignore `image:`; apk is Alpine-only. Install gcc only when apk exists.
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache build-base
      fi
  script:
    # One shell: keep cwd and coverage.out path consistent for shell executors.
    - |
      set -euo pipefail
      cd "${CI_PROJECT_DIR}/packages/go"
      if command -v gcc >/dev/null 2>&1 || command -v cc >/dev/null 2>&1; then
        export CGO_ENABLED=1
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
      else
        export CGO_ENABLED=0
        go test -coverprofile=coverage.out -covermode=atomic ./...
      fi
      go tool cover -func=coverage.out | tail -1
  artifacts:
    when: on_success
    paths:
      - packages/go/coverage.out
    expire_in: 1 week

# === BUILD ===

python:build:
  extends: .integrity
  stage: build
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
  script:
    - export PATH="${CI_PROJECT_DIR}/.uv-install/bin:${PATH}"
    - cd "${CI_PROJECT_DIR}/packages/python" && uv build
  artifacts:
    paths:
      - packages/python/dist/
    expire_in: 1 week

typescript:build:
  extends: .integrity
  stage: build
  image: ${NODE_IMAGE}
  <<: *node-cache
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    - export PATH="${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript && pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run build
  artifacts:
    paths:
      - packages/typescript/dist/
    expire_in: 1 week

go:build:
  extends:
    - .integrity
    - .go-cache-clean
  stage: build
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
  script:
    - cd "${CI_PROJECT_DIR}/packages/go" && go build ./...

# === SECURITY (dependency / vuln scan — pipeline fails if OSV reports issues) ===

security:osv-scan:
  extends: .integrity
  stage: security
  dependencies: []
  image: alpine:3.20
  before_script:
    - apk add --no-cache ca-certificates curl
    - |
      set -e
      ARCH="$(uname -m)"
      case "$ARCH" in
        x86_64) DL_SUFFIX="linux_amd64" ;;
        aarch64 | arm64) DL_SUFFIX="linux_arm64" ;;
        *) echo "osv-scanner: unsupported arch ${ARCH}" >&2; exit 1 ;;
      esac
      URL="https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_${DL_SUFFIX}"
      install -d /usr/local/bin
      curl -fsSL -o /usr/local/bin/osv-scanner "$URL"
      chmod +x /usr/local/bin/osv-scanner
  script:
    - osv-scanner scan -r "${CI_PROJECT_DIR}"

# === RELEASE (python: PyPI only from main branch when pyproject.toml changes) ===

python:release:
  extends: .integrity
  stage: release
  image: ${PYTHON_IMAGE}
  <<: *python-cache
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-install-uv.sh"
    - cd packages/python
  script:
    - cd "${CI_PROJECT_DIR}/packages/python" && uv build
    # Trusted publishing: GitLab sets PYPI_ID_TOKEN; uv exchanges it with PyPI. Optional legacy: PYPI_API_TOKEN.
    - |
      if [ -n "${PYPI_API_TOKEN:-}" ]; then
        cd "${CI_PROJECT_DIR}/packages/python" && uv publish --token "${PYPI_API_TOKEN}"
      else
        cd "${CI_PROJECT_DIR}/packages/python" && uv publish
      fi
  environment:
    name: pypi
    url: https://pypi.org/project/sonicwall-sdk/
  rules:
    # Only `main` branch pushes (not tags, not other branches). Runs after earlier stages succeed.
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - packages/python/pyproject.toml

typescript:release:
  extends: .integrity
  stage: release
  image: ${NODE_IMAGE}
  <<: *node-cache
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.pnpm-tool"
    - npm install pnpm@10.33.0 --prefix "${CI_PROJECT_DIR}/.pnpm-tool" --omit=dev --no-audit --no-fund
    # npm trusted publishing requires npm CLI >= 11.5.1 (bundled with Node 22 is older).
    - export NPM_GLOBAL="${CI_PROJECT_DIR}/.npm-global-release"
    - mkdir -p "${NPM_GLOBAL}"
    - npm install npm@11.6.2 --prefix "${NPM_GLOBAL}" --no-audit --no-fund
    - export PATH="${NPM_GLOBAL}/node_modules/.bin:${CI_PROJECT_DIR}/.pnpm-tool/node_modules/.bin:${PATH}"
    - cd packages/typescript
    - pnpm install --frozen-lockfile
  script:
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm run build
    # Trusted publishing: npm/pnpm use NPM_ID_TOKEN; provenance is automatic for public repo + public package.
    - |
      if [ -n "${NPM_TOKEN:-}" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      fi
    - cd "${CI_PROJECT_DIR}/packages/typescript" && pnpm publish --no-git-checks --access public
  environment:
    name: npm
    url: https://www.npmjs.com/package/@sonicwall/sdk
  rules:
    - if: '$CI_COMMIT_TAG =~ /^typescript\/v\d+\.\d+\.\d+/'

go:release:
  extends:
    - .integrity
    - .go-cache-clean
  stage: release
  image: ${GO_IMAGE}
  <<: *go-cache
  before_script:
    - . "${CI_PROJECT_DIR}/scripts/ci-ensure-go.sh"
  script:
    - cd "${CI_PROJECT_DIR}/packages/go" && go build ./...
    - cd "${CI_PROJECT_DIR}/packages/go" && go test ./...
    - echo "Go module tag ${CI_COMMIT_TAG} published via git tag."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^go\/v\d+\.\d+\.\d+/'
